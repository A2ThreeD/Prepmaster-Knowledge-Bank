<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prepmaster Maps</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #102238;
      --panel-2: #16304d;
      --text: #edf4fb;
      --muted: #9bb0c7;
      --accent: #7bb7ff;
      --border: rgba(158, 190, 227, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(900px 420px at 50% -10%, rgba(76, 123, 181, 0.24), transparent 60%),
        linear-gradient(180deg, #091426 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      padding: 24px;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)),
        var(--panel);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    .tag {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--panel-2);
    }

    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <span class="tag">Navigation</span>
    <h1>Offline Maps</h1>
    <p class="muted">
      This placeholder marks the future custom maps experience. We can drop in a lightweight viewer or local tile service here.
    </p>
    <div class="actions">
      <a class="button" href="/">Return to main page</a>
      <a class="button" href="/admin">Open Admin Portal</a>
    </div>
  </main>
</body>
</html>
